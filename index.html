<html lang="en">

  <title>Todo Apps</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="main-container">
    <h1>Todo App</h1>

    <ul>

        <li>  Eat <button class="delete">delete</button></li>
      </div>
      
      <div class="check">
        <input type="checkbox">
        <li>Sleep <button class="delete">delete</button></li>
      </div>
      
    </ul>
    
  </div>
  
  <script src="app.js"></script>
</body>
</html>
